services:

  # ── Databases ────────────────────────────────────────────────────────────────

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Services ─────────────────────────────────────────────────────────────────

  external-service-log:
    build: ./services/external-service-log
    ports:
      - "3000:3000"
      - "50051:50051"
    environment:
      PORT: 3000
      GRPC_PORT: 50051
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: service_logs
    depends_on:
      mongo:
        condition: service_healthy

  archiver:
    build: ./services/external-service-log
    command: ["/bin/sh", "-c", "while true; do ./archiver; echo 'archiver: sleeping 24h'; sleep 86400; done"]
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: service_logs
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────────────────────

volumes:
  mongo_data:
