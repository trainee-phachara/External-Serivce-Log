syntax = "proto3";

package logging;
option go_package = "user-service/internal/grpc/pb";

service IngestService {
  rpc Ingest (IngestRequest) returns (IngestResponse);
}

message LogSource {
  string app_name = 1;
  string service_name = 2;
}

message IngestRequest {
  LogSource source = 1;
  string trace_id = 2;
  string endpoint = 3;
  string http_status = 4;
  string type = 5;               // "request" | "response"
  string direction = 6;          // "inbound" | "outbound"
  string metadata_json = 7;      // optional, JSON-encoded object
  string raw_payload_json = 8;   // optional, JSON-encoded object
  string payload_json = 9;       // optional, JSON-encoded object
}

message IngestResponse {
  bool accepted = 1;
  repeated string errors = 2;
}
